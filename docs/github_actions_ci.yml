name: AI English Coach CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py conversation_engine.py evaluator.py feedback.py speech_utils.py scripts/*.py

      - name: Run unit tests
        run: |
          pytest -q

      - name: Run smoke test
        run: |
          python scripts/smoke_test.py

      - name: Check API configuration dry run
        run: |
          python scripts/check_api.py

      - name: Verify delivery artifacts
        run: |
          python scripts/verify_delivery.py
